<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="text" name="할일" placeholder="할일 입력" />
    <button id="add">추가</button>
    <div id="todoList"></div>

    <script>
      const todoListDiv = document.querySelector("#todoList");
      const input = document.querySelector("input");
      const addBtn = document.querySelector("#add");

      let id = 1;
      // todo 추가
      addBtn.addEventListener("click", () => {
        const text = input.value;
        const todo = document.createElement("div");
        todo.id = id++;

        const checkbox = document.createElement("input");
        checkbox.setAttribute("class", "toggle");
        checkbox.setAttribute("type", "checkbox");
        checkbox.setAttribute("name", todo.id);
        todo.appendChild(checkbox);

        const label = document.createElement("label");
        label.setAttribute("for", todo.id);
        label.textContent = text;
        todo.appendChild(label);

        const rmBtn = document.createElement("button");
        rmBtn.setAttribute("class", "remove");
        rmBtn.textContent = "❌";
        todo.appendChild(rmBtn);

        todoListDiv.appendChild(todo);
        input.value = "";
      });

      // todo 토글
      function toggleTodo(id) {
        const todo = this.todoList.find((todo) => todo.id === id);
        if (!todo) {
          throw new Error("존재하지 않는 Todo");
        }
        todo.complited = !todo.complited;
      }
      // todo 삭제
      function deleteTodo(id) {
        // this.todoList = this.todoList.filter((todo) => todo.id !== id);
        const targetIndex = this.todoList.findIndex((todo) => todo.id === id);
        this.todoList.splice(targetIndex, 1);
      }
    </script>
  </body>
</html>
